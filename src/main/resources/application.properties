spring.application.name=api

# IMPORTANTE
# Normalmente este archivo va dentro de .gitignore cuando contiene datos sensibles visibles
# En este ejemplo, los valores se modificaron por datos genéricos

spring.datasource.url=jdbc:mysql://localhost:3306/tu_base_de_datos
spring.datasource.username=usuario
spring.datasource.password=contraseńa
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# DDL- AUTO -> none, create, create-drop, update, validate

# create: Elimina las tablas existentes y vuelve a crearlas desde cero al arrancar.
# create-drop: Crea las tablas al iniciar y las elimina al detener la aplicación.
# update: Compara las entidades con las tablas y agrega/modifica columnas si es necesario, sin borrar datos existentes.
# validate: Compara las entidades con las tablas existentes y lanza un error si no coinciden, sin realizar cambios.
# none: Deshabilita cualquier gestión automática de esquemas.

spring.jpa.hibernate.ddl-auto=update

# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true